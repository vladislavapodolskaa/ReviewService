<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <style>
        :root {
            --bg-cream: #fff1b5;
            --soft-blue: #c1dbe8;
            --wine: #501924;
            --pistachio: #c9daa8;
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #fcfaf2;
            color: var(--wine);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-cream);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(80, 25, 36, 0.15);
            border: 2px solid var(--wine);
            text-align: center;
        }
        h1 {
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.8em;
            margin-bottom: 30px;
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        .alert-success { background-color: var(--pistachio); color: var(--wine); border: 1px solid var(--wine); }
        .alert-error { background-color: #f8d7da; color: #8b0000; border: 1px solid #8b0000; }
        .alert-logout { background-color: var(--soft-blue); color: var(--wine); border: 1px solid var(--wine); }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid var(--soft-blue);
            border-radius: 8px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: var(--wine);
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--wine);
            color: var(--bg-cream);
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #3d131b;
            transform: translateY(-2px);
        }
        .register-link {
            margin-top: 25px;
            font-size: 0.95em;
        }
        .register-link a {
            color: var(--wine);
            font-weight: bold;
            text-decoration: none;
            border-bottom: 2px solid var(--soft-blue);
        }
        .register-link a:hover {
            border-bottom-color: var(--wine);
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1>Вход</h1>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${param.error}" class="alert alert-error">Неверный логин или пароль</div>
    <div th:if="${param.logout}" class="alert alert-logout">Вы вышли из системы</div>
    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Логин</label>
            <input type="text" id="username" name="username" required placeholder="Введите ваш логин">
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit">Войти в систему</button>
    </form>
    <div class="register-link">
        Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a>
    </div>
</div>
</body>
</html>
