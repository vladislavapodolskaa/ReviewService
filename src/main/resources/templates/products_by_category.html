<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${category.name} + ' | Продукты'"></title>
  <style>
    :root {
      --bg-cream: #fff1b5;
      --soft-blue: #c1dbe8;
      --wine: #501924;
      --pistachio: #c9daa8;
      --white: #ffffff;
      --chocolate: #3e2723;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background-color: #fdfaf4;
      color: var(--chocolate);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background-color: var(--bg-cream);
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 15px 40px rgba(62, 39, 35, 0.1);
    }

    h1 {
      color: var(--wine);
      border-bottom: 3px solid var(--chocolate);
      padding-bottom: 10px;
      margin-bottom: 30px;
      text-transform: uppercase;
    }

    .back-btn {
      text-decoration: none;
      color: var(--chocolate);
      font-weight: bold;
      display: inline-block;
      margin-bottom: 25px;
      font-size: 0.9em;
    }

    /* Сетка карточек */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 25px;
      padding: 0;
      list-style: none;
    }

    .product-card {
      background: var(--white);
      border: 2px solid var(--soft-blue);
      border-radius: 20px;
      overflow: hidden; /* Чтобы картинка не вылезала за скругления */
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-8px);
      border-color: var(--chocolate);
      box-shadow: 0 10px 25px rgba(62, 39, 35, 0.15);
    }

    /* Контейнер для фото */
    .card-image-wrap {
      width: 100%;
      height: 200px;
      overflow: hidden;
      background-color: #f0f0f0;
      border-bottom: 1px solid var(--soft-blue);
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .product-card:hover .card-img {
      transform: scale(1.1);
    }

    /* Контент карточки */
    .card-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .product-title {
      color: var(--chocolate);
      text-decoration: none;
      font-size: 1.25em;
      font-weight: bold;
      margin-bottom: 10px;
      display: block;
    }

    .product-title:hover { color: var(--wine); }

    .rating-pill {
      display: inline-block;
      background: var(--pistachio);
      color: var(--chocolate);
      padding: 3px 10px;
      border-radius: 50px;
      font-size: 0.85em;
      font-weight: bold;
      margin-bottom: 12px;
      border: 1px solid var(--chocolate);
    }

    .short-desc {
      font-size: 0.9em;
      color: #6d4c41;
      line-height: 1.4;
      margin-bottom: 15px;
      flex-grow: 1;
      /* Обрезка текста до 2 строк */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .details-link {
      text-align: right;
      color: var(--wine);
      font-weight: bold;
      text-decoration: none;
      font-size: 0.9em;
    }

    .details-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="container">
  <a th:href="@{/}" class="back-btn">← Все категории</a>

  <h1><span th:text="${category.name}">Категория</span></h1>

  <div th:if="${products.isEmpty()}" style="text-align: center; padding: 40px;">
    <p>В этой категории пока нет товаров.</p>
  </div>

  <ul th:unless="${products.isEmpty()}" class="product-grid">
    <li th:each="product : ${products}" class="product-card">
      <div class="card-image-wrap">
        <a th:href="@{/product/{id}(id=${product.id})}">
          <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/300x200?text=Нет+фото'}"
               th:alt="${product.name}"
               class="card-img">
        </a>
      </div>

      <div class="card-body">
        <div th:if="${product.averageRating != null}" class="rating-pill">
          ⭐ <span th:text="${#numbers.formatDecimal(product.averageRating, 1, 1)}">4.5</span>
        </div>

        <a th:href="@{/product/{id}(id=${product.id})}"
           th:text="${product.name}"
           class="product-title">Название</a>

        <p class="short-desc" th:text="${product.description}">Краткое описание товара...</p>

        <a th:href="@{/product/{id}(id=${product.id})}" class="details-link">Смотреть детали →</a>
      </div>
    </li>
  </ul>
</div>

</body>
</html>
