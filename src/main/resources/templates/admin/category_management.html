<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Управление Категориями</title>
  <style>
    :root {
      --bg-cream: #fff1b5;
      --accent-blue: #c1dbe8;
      --dark-brown: #43302e;
      --success-green: #2d5a27;
      --error-red: #8b0000;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background-color: #fcfaf2;
      color: var(--dark-brown);
      margin: 0;
      padding: 20px;
    }

    .admin-card {
      max-width: 1000px;
      margin: 0 auto;
      background-color: var(--bg-cream);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(67, 48, 46, 0.1);
    }

    h1, h2 {
      border-left: 5px solid var(--dark-brown);
      padding-left: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Сообщения */
    .success {
      color: var(--success-green);
      border: 2px solid var(--success-green);
      background-color: #c9daa8;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .error {
      color: var(--error-red);
      border: 2px solid var(--error-red);
      background-color: #c9daa8;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    /* Форма */
    .form-section {
      background: white;
      padding: 25px;
      border-radius: 10px;
      margin-bottom: 30px;
      border: 1px solid var(--accent-blue);
    }

    label { font-weight: bold; margin-right: 10px; }

    input[type="text"] {
      padding: 10px;
      border: 2px solid var(--accent-blue);
      border-radius: 5px;
      width: 300px;
      outline-color: var(--dark-brown);
    }

    button.btn-primary {
      background-color: var(--dark-brown);
      color: var(--bg-cream);
      border: none;
      padding: 11px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    /* Таблица */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 5px;
      margin-top: 20px;
    }

    th {
      background-color: var(--dark-brown);
      color: var(--bg-cream);
      padding: 12px;
      text-align: left;
    }

    td {
      background-color: white;
      padding: 12px;
      border-top: 1px solid #eee;
      border-bottom: 1px solid #eee;
    }

    /* Стили кнопок в таблице */
    .action-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      font-size: 13px;
      margin-right: 5px;
    }

    .btn-child { background-color: var(--accent-blue); color: var(--dark-brown); }
    .btn-edit { background-color: #fceaa2; color: #faf6ed; }
    .btn-delete { background-color: white; color: #501924; border: 1px solid #501924; }
    .btn-delete:hover { background-color: #501924; color: white; }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--dark-brown);
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="admin-card">
  <h1>Управление Категориями</h1>

  <div th:if="${successMessage}" class="success" th:text="${successMessage}"></div>
  <div th:if="${errorMessage}" class="error">
    <strong>Ошибка:</strong> <span th:text="${errorMessage}"></span>
  </div>

  <div class="form-section">
    <h2><span th:text="${newCategory.id} == null ? 'Добавить новую категорию' : 'Редактировать категорию'"></span></h2>
    <form th:action="@{/admin/categories/save}" method="post" th:object="${newCategory}">
      <input type="hidden" th:field="*{id}" th:if="${newCategory.id != null}">
      <input type="hidden" th:field="*{parent}">

      <label for="categoryName">Название:</label>
      <input type="text" id="categoryName" th:field="*{name}" required placeholder="Введите название...">

      <button type="submit" class="btn-primary" th:text="*{id} == null ? 'Создать' : 'Обновить'"></button>

      <a th:if="${newCategory.id != null}" th:href="@{/admin/categories}" style="text-decoration: none;">
        <button type="button" style="padding: 10px; border-radius: 5px; border: 1px solid gray;">Отмена</button>
      </a>
    </form>
  </div>

  <h2>Список существующих категорий</h2>
  <table>
    <thead>
    <tr>
      <th style="width: 10%; border-radius: 5px 0 0 0;">ID</th>
      <th>Название</th>
      <th style="width: 40%; border-radius: 0 5px 0 0;">Действия</th>
    </tr>
    </thead>
    <tbody>
    <th:block th:each="rootCategory : ${categories}" th:if="${rootCategory.parent == null}">
      <th:block th:replace="~{admin/category_management :: category-list(category=${rootCategory}, depth=0)}"></th:block>
    </th:block>
    <tr th:if="${#lists.isEmpty(categories)}">
      <td colspan="3" style="text-align: center; color: gray;">Категории не найдены.</td>
    </tr>
    </tbody>
  </table>

  <a th:href="@{/admin/dashboard}" class="back-link">← Вернуться на Панель Администратора</a>
</div>

</body>

<div th:fragment="category-list(category, depth)">
  <th:block th:if="${category != null}">
    <tr>
      <td th:text="${category.id}" style="color: gray; font-size: 0.9em;"></td>
      <td th:style="'padding-left: ' + (${depth} * 30 + 15) + 'px;'">
        <span th:text="${category.name}" th:style="${depth == 0 ? 'font-weight: bold; font-size: 1.1em;' : 'font-weight: normal;'}"></span>
      </td>
      <td>
        <a th:href="@{/admin/categories/add-child/{id}(id=${category.id})}">
          <button class="action-btn btn-child">+ Подкатегория</button>
        </a>
        <a th:href="@{/admin/categories/edit/{id}(id=${category.id})}">
          <button class="action-btn btn-edit">Изменить</button>
        </a>
        <form th:action="@{/admin/categories/delete/{id}(id=${category.id})}" method="post"
              style="display: inline;"
              onsubmit="return confirm('Вы уверены? Это удалит категорию и все подкатегории!');">
          <button type="submit" class="action-btn btn-delete">Удалить</button>
        </form>
      </td>
    </tr>
    <th:block th:if="${not #lists.isEmpty(category.children)}">
      <th:block th:each="child : ${category.children}">
        <th:block th:replace="~{admin/category_management :: category-list(category=${child}, depth=${depth + 1})}"></th:block>
      </th:block>
    </th:block>
  </th:block>
</div>
</html>
